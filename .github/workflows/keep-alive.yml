name: Keep Backend Alive

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sSf https://your-backend-url.azurewebsites.net/health || echo "Ping failed, backend may be waking up"
