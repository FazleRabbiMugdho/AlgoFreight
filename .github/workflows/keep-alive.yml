name: Keep Backend Alive

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sSf --connect-timeout 5 --max-time 10 "${{ vars.BACKEND_HEALTH_URL }}" || echo "Ping failed, backend may be waking up"
